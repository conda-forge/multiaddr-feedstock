{% set name = "multiaddr" %}
{% set version = "0.2.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: acb6b25c332ec1b2f1f8fef8d03a8c63385d34a87d690df0f4bba43cdf6efe8d

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - setuptools
    - pytest-runner
    - python {{ python_min }}
  run:
    - python >={{ python_min }}
    - base58
    - dnspython >=2.7.0
    - idna
    - netaddr
    - psutil
    - py-cid >=0.3.1
    - py-multicodec >0.2.0
    - py-multibase
    - pymultihash
    - trio-typing >=0.0.4
    - trio >=0.26.0
    - varint

test:
  imports:
    - multiaddr
    - multiaddr.codecs
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/multiformats/py-multiaddr
  summary: Python implementation of jbenet's multiaddr
  doc_url: https://pythonhosted.org/multiaddr/
  license: MIT
  license_file: LICENSE-MIT

extra:
  recipe-maintainers:
    - step21
